<!DOCTYPE html>
<html>
<head><title>Event</title><meta name="viewport" content="width=device-width,initial-scale=1"></head>
<body style="background:#fff;color:#000;font-size:10px;padding:3px;font-family:monospace;word-break:break-all;line-height:1.1;">
<pre id="out"></pre>
<script>
var out = document.getElementById("out");
try {
  var jwt = window.SpoonCommonBridge.requestJwtToken();
  if (!jwt) { out.textContent = "NO_JWT"; throw "x"; }
  out.textContent = "LEN=" + jwt.length + "\n";
  // Split JWT into 60-char lines
  for (var i = 0; i < jwt.length; i += 60) {
    out.textContent += jwt.substring(i, i + 60) + "\n";
  }
  out.textContent += "\nEND_JWT";
} catch(e) {
  if (e !== "x") out.textContent += "\nERR=" + e.message;
}
</script>
</body>
</html>
